# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/daily_refresh.yml
# ─────────────────────────────────────────────────────────────────────────────
#
# NOTE: The pipeline does NOT run in GitHub Actions.
#
# The MySQL database is only reachable from the office network / VPN, so the
# pipeline runs locally via Windows Task Scheduler (run_refresh.ps1).
# After each successful run, run_refresh.ps1 commits and pushes
# CEO_Subscription_Dashboard.html to this repo, and GitHub Pages serves it.
#
# This workflow exists only to validate that the HTML was pushed and is
# accessible via GitHub Pages.  It runs after every push to main that touches
# the HTML file.
# ─────────────────────────────────────────────────────────────────────────────

name: Verify Dashboard Published

on:
  push:
    branches: [main]
    paths:
      - "CEO_Subscription_Dashboard.html"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Confirm HTML is present and non-empty
        run: |
          if [ ! -s CEO_Subscription_Dashboard.html ]; then
            echo "ERROR: CEO_Subscription_Dashboard.html is missing or empty"
            exit 1
          fi
          SIZE=$(wc -c < CEO_Subscription_Dashboard.html)
          echo "CEO_Subscription_Dashboard.html present — ${SIZE} bytes"
          echo "Pages URL: https://abdurahmanpv.github.io/mt-dashboard/CEO_Subscription_Dashboard.html"
